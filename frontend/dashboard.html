<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Sistema RBAC</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo rápido para la tabla del admin */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; color: black; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .btn-logout { background: #333; color: white; padding: 10px; border: none; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body id="dash-body">
                                    
    <div class="contenedor">
        <h1 id="bienvenida">Cargando...</h1>
        <p id="rol-texto"></p>
        <hr>

        <!-- Aquí se inyectará la tabla si eres admin -->
        <div id="contenido-privado"></div>

        <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
