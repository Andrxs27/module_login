<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

    <div class="contenedor">
        <h1>Nueva Cuenta</h1>
        <p>Regístrate para empezar</p>

        <form id="formRegistro">

            <label>Nombre</label>
            <input type="text" name="nombre" required>

            <label>Apellido</label>
            <input type="text" name="lastname" required>

            <label>Correo</label>
            <input type="email" name="email" required>

            <label>Contraseña</label>
            <input type="password" name="password" required>

            <label>Documento</label>
            <input type="text" name="document">

            <label>Tipo Documento</label>
            <select name="type_document">
                <option value="CC">CC</option>
                <option value="TI">TI</option>
                <option value="PS">PS</option>
                <option value="PPT">PPT</option>
                <option value="DNI">DNI</option>
            </select>

            <label>Teléfono</label>
            <input type="text" name="phone">

            <label>Dirección</label>
            <input type="text" name="address">

            <label>Edad</label>
            <input type="number" name="age">

            <label>Departamento</label>
            <input type="text" name="departamento">

            <label>Ciudad</label>
            <input type="text" name="ciudad">

            <label>Sexo</label>
            <select name="sexo">
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
            </select>

            <label>Fecha de nacimiento</label>
            <input type="date" name="born">

            <button type="submit">Crear cuenta</button>

        </form>

        <p class="enlace">
            ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
        </p>
    </div>

    <script src="./assets/js/constantes.js"></script>
    <script type="text/javascript" src="./assets/js/registro.js"></script>

</body>

</html>
