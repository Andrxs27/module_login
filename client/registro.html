<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
    <link rel="stylesheet" href="/client/assets/css/style.css">
</head>

<body>

    <div class="contenedor">
        <h1>Nueva Cuenta</h1>
        <p>Regístrate para empezar</p>

        <form id="formRegistro">

            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

            <label for="lastname">Apellido</label>
            <input type="text" id="lastname" name="lastname" placeholder="Tu apellido" required>

            <label for="email">Correo</label>
            <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>

            <label for="document">Documento</label>
            <input type="text" id="document" name="document" placeholder="Número de documento">

            <label for="type_document">Tipo Documento</label>
            <select id="type_document" name="type_document" title="Selecciona tu tipo de documento">
                <option value="CC">CC</option>
                <option value="TI">TI</option>
                <option value="PS">PS</option>
                <option value="PPT">PPT</option>
                <option value="DNI">DNI</option>
            </select>

            <label for="phone">Teléfono</label>
            <input type="text" id="phone" name="phone" placeholder="Ej: 3001234567">

            <label for="address">Dirección</label>
            <input type="text" id="address" name="address" placeholder="Calle, Carrera, Ciudad">

            <label for="age">Edad</label>
            <input type="number" id="age" name="age" placeholder="Tu edad">

            <label for="departamento">Departamento</label>
            <input type="text" id="departamento" name="departamento" placeholder="Estado o Departamento">

            <label for="ciudad">Ciudad</label>
            <input type="text" id="ciudad" name="ciudad" placeholder="Ciudad de residencia">

            <label for="sexo">Sexo</label>
            <select id="sexo" name="sexo" title="Selecciona tu sexo">
                <option value="M">Masculino</option>
                <option value="F">Femenino</option>
            </select>

            <label for="born">Fecha de nacimiento</label>
            <input type="date" id="born" name="born">

            <button type="submit">Crear cuenta</button>

        </form>

        <p class="enlace">
            ¿Ya tienes cuenta? <a href="/client/index.html">Inicia sesión</a>
        </p>
    </div>

    <script>
        document.getElementById("formRegistro").addEventListener("submit", async (e) => {
            e.preventDefault();

            const form = e.target;

            const data = {
                nombre: form.nombre.value,
                lastname: form.lastname.value,
                email: form.email.value,
                password: form.password.value,
                document: form.document.value,
                type_document: form.type_document.value,
                phone: form.phone.value,
                address: form.address.value,
                age: form.age.value,
                departamento: form.departamento.value,
                ciudad: form.ciudad.value,
                sexo: form.sexo.value,
                born: form.born.value
            };

            try {
                const res = await fetch("http://localhost:3000/api/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                alert(result.message);

            } catch (error) {
                console.error(error);
                alert("Error al conectar con el servidor");
            }
        });
    </script>

</body>

</html>
