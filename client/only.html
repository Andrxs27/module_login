<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Hola soy un: <span id="type"></span> con id <span id="id"></span></h1>
    <script>        
    
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        fetch(`http://localhost:3000/${id}`, { // <-- ID aquíF
        method: 'GET',
        headers: {
            'Content-Type': 'application/json'
        },
    
    })
    .then(res => res.json())
    .then((res) => {
        document.getElementById("type").textContent = res.role
        document.getElementById("id").innerText = res.id
    })
    .catch((e) => {
        console.log(e)
    })
</script>
    
</body>
</html>
