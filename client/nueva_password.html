<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña</title>
    <link rel="stylesheet" href="/client/assets/css/style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Nueva contraseña</h1>
        <p>Escribe tu nueva contraseña.</p>

        <form id="formNuevaPassword">
            <label>Nueva contraseña</label>
            <input type="password" name="password" placeholder="Tu nueva contraseña" required>

            <label>Confirmar contraseña</label>
            <input type="password" name="confirmar" placeholder="Repite la contraseña" required>

            <button type="submit">Guardar contraseña</button>
        </form>

        <div id="mensaje"></div>

        <p class="enlace">
            <a href="/client/index.html">Volver al inicio</a>
        </p>
    </div>

    <script src="/client/assets/js/nueva_password.js"></script>

</body>
</html>
