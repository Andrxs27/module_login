<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        fetch("http://localhost:3000/123", { // <-- ID aquí
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                nombre: 'Faber sin lentes',
                edad: 20
            })
        })
            .then(res => res.json())
            .then((res) => {
                console.log(res)
            })
            .catch((e) => {
                console.log(e)
            })

        async function actualizarUsuario() {
            try {
                const res = await fetch("http://localhost:3000/123", {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nombre: 'Faber sin lentes',
                        edad: 20
                    })
                });

                const data = await res.json();
                console.log(data);

            } catch (e) {
                console.log(e);
            }
        }

        actualizarUsuario();


    </script>

</body>

</html>
